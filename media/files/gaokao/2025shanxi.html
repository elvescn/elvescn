            background: #d2dfe9;
            border-color: #b8ccdb;
        }

            align-items: center;
            margin-bottom: 1rem;

            border-radius: 40px;
            font-size: 0.9rem;
            color: #1f4a5e;

        .stats .total strong {
            color: #0c3142;
        }
        .stats .hint {
            font-size: 0.85rem;
            color: #4a6f82;
        }
        .table-wrap {

            border-radius: 14px;
            border: 1px solid #e5edf4;

        table {

            font-weight: 600;
            color: #1e4357;
            border-bottom: 2px solid #d6e2ec;
            white-space: nowrap;
            cursor: pointer;

            font-size: 0.75rem;
            color: #8aacbf;

            color: #1a5a6e;

        td {

        }

            font-size: 2.2rem;
            display: block;

        `;
        
        const tbody = document.getElementById('tableBody');
        const totalSpan = document.getElementById('totalCount');
        const shownSpan = document.getElementById('shownCount');
        const codeInput = document.getElementById('codeInput');
        const nameInput = document.getElementById('nameInput');
        const resetBtn = document.getElementById('resetBtn');

        let dataset = [];
        let sortField = null;
        let sortAsc = true;
        let currentFiltered = [];

        function parseCSVLine(line) {
            const parts = line.split(',').map(s => s.trim());
            if (parts.length < 6) return null;
            const code = parts[0];
            const name = parts[1];
            const category = parts[2];
            const group = parts[3];
            const score = parseFloat(parts[4]);
            const rank = parseInt(parts[5], 10);
            if (!code || !name || !category || !group || isNaN(score) || isNaN(rank)) {
                return null;
            }
            return { code, name, category, group, score, rank };
        }

        function loadData(text) {
            const lines = text.split('\n').filter(line => line.trim() !== '');
            const parsed = [];
            for (const line of lines) {
                const row = parseCSVLine(line);
                if (row) parsed.push(row);
            }
            dataset = parsed;
            // 重置排序状态
            sortField = null;
            sortAsc = true;
            updateArrowIndicators();
            filterData();
        }

        function renderTable(data) {
            totalSpan.textContent = dataset.length;
            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><span>🔍</span> 没有匹配的记录</td></tr>`;
                shownSpan.textContent = '0';
                return;
            }
            let html = '';
            for (const d of data) {
                html += `<tr>
                    <td class="col-code">${d.code}</td>
                    <td class="col-name"><strong>${d.name}</strong></td>
                    <td>${d.category}</td>
                    <td>${d.group}</td>
                    <td class="col-score">${d.score}</td>
                    <td class="col-rank">${d.rank}</td>
                </tr>`;
            }
            tbody.innerHTML = html;
            shownSpan.textContent = data.length;
        }

        function filterData() {
            const codeKw = codeInput.value.trim().toLowerCase();
            const nameKw = nameInput.value.trim().toLowerCase();

            let filtered = dataset.filter(d => {
                let match = true;
                if (codeKw) {
                    match = match && d.code.toLowerCase().includes(codeKw);
                }
                if (nameKw) {
                    match = match && d.name.toLowerCase().includes(nameKw);
                }
                return match;
            });

            // 应用排序
            if (sortField) {
                filtered = sortData(filtered, sortField, sortAsc);
            }

            currentFiltered = filtered;
            renderTable(filtered);
        }

        function sortData(data, field, ascending) {
            const sorted = [...data];
            sorted.sort((a, b) => {
                let valA = a[field];
                let valB = b[field];
                // 字符串比较
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                    if (ascending) return valA.localeCompare(valB);
                    else return valB.localeCompare(valA);
                }
                // 数字比较
                if (ascending) return valA - valB;
                else return valB - valA;
            });
            return sorted;
        }

        function updateArrowIndicators() {
            const allTh = document.querySelectorAll('th[data-field]');
            allTh.forEach(th => {
                const arrow = th.querySelector('.arrow');
                const field = th.dataset.field;
                if (field === sortField) {
                    arrow.textContent = sortAsc ? '▲' : '▼';
                    arrow.classList.add('active');
                } else {
                    arrow.textContent = '⇅';
                    arrow.classList.remove('active');
                }
            });
        }

        function handleSort(field) {
            if (sortField === field) {
                sortAsc = !sortAsc;
            } else {
                sortField = field;
                sortAsc = true;
            }
            updateArrowIndicators();
            filterData();
        }

        function resetAll() {
            codeInput.value = '';
            nameInput.value = '';
            sortField = null;
            sortAsc = true;
            updateArrowIndicators();
            filterData();
        }

        // 绑定事件
        codeInput.addEventListener('input', filterData);
        nameInput.addEventListener('input', filterData);
        resetBtn.addEventListener('click', resetAll);

        // 表头点击排序
        document.querySelectorAll('th[data-field]').forEach(th => {
            th.addEventListener('click', function() {
                const field = this.dataset.field;
                handleSort(field);
            });
        });

        // 初始化加载
        loadData(RAW_DATA);
    </script>
